<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    
    <!-- Essential SEO Meta Tags -->
    <title>ZoCall - Secure Video Conferencing & Online Meeting Platform</title>
    <meta name="description" content="ZoCall - High-quality video conferencing solution for businesses and remote teams. Host secure online meetings, webinars, and virtual collaborations with HD video and crystal-clear audio.">
    <meta name="keywords" content="video conferencing, online meetings, virtual collaboration, webinar platform, remote work tools">
    <meta name="author" content="ZoCall">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zocall.com/">
    <meta property="og:title" content="ZoCall - Secure Video Conferencing & Online Meeting Platform">
    <meta property="og:description" content="High-quality video conferencing solution for businesses and remote teams.">
    <meta property="og:image" content="https://zocall.com/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">

    <meta property="twitter:description" content="High-quality video conferencing solution for businesses and remote teams.">
    <meta property="twitter:image" content="https://zocall.com/twitter-image.jpg">

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://zocall.com/" />

    <!-- Favicons for All Devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://api.zocall.com">
    
    <!-- Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "applicationCategory": "Communication",

        "@type": "AggregateRating",

      },
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      }
    }
    </script>
